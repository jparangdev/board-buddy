spring:
  application:
    name: api-server
  profiles:
    active: local
  config:
    import:
      - optional:classpath:application-persistence.yml
      - optional:classpath:application-security.yml

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    kr.co.jparangdev.boardbuddy: DEBUG

# Swagger (OpenAPI)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
